
spring.application.name=QuickTix
server.port = 8081

#spring.datasource.url = jdbc:mysql://localhost:3306/QuickTix?useSSL=false
#spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=jdbc:sqlserver://localhost:1433;DatabaseName=QuickTix;encrypt=false;trustServerCertificate=false;
spring.datasource.username = sa
spring.datasource.password = 123456

spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2016Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

#create-drop
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

spring.sql.init.schema-locations=classpath:bd/tablas.sql
spring.sql.init.data-locations=classpath:bd/data.sql









